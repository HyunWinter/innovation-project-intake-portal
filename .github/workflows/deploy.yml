name: Deploy to EC2 Demo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the project directory (assume it's cloned in ~/innovation-portal)
            cd ~/innovation-portal || { echo "Project directory not found"; exit 1; }
            
            # Pull latest changes
            git pull origin main
            
            # Create or update .env file with production secrets
            echo "DOMAIN=${{ secrets.DOMAIN }}" > .env
            echo "EC2_HOST=${{ secrets.EC2_HOST }}" >> .env
            
            # Rebuild and restart the Docker containers
            docker compose up -d --build
            
            # Run database migrations (optional, but recommended)
            docker compose exec -T backend python manage.py migrate
            
            # Collect static files for Django admin panel
            docker compose exec -T backend python manage.py collectstatic --noinput
