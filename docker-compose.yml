services:
  db:
    image: postgres:16
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-innovation_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-innovation_pass}
      - POSTGRES_DB=${POSTGRES_DB:-innovation_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --threads 10
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-innovation_db}
      - POSTGRES_USER=${POSTGRES_USER:-innovation_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-innovation_pass}
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-demo_secret_key_change_me_in_production}
      - DEBUG=False
      - ALLOWED_HOSTS=${EC2_HOST:-localhost},${DOMAIN:-localhost}
      - CORS_ALLOWED_ORIGINS=http://${EC2_HOST:-localhost},https://${EC2_HOST:-localhost},https://${DOMAIN:-localhost}
    depends_on:
      db:
        condition: service_healthy

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        - VITE_API_BASE=https://${DOMAIN:-localhost}
    restart: always
    environment:
      - DOMAIN=${DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
